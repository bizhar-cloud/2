<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Management System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #050505;
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }

        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
        }
        body::before { background: linear-gradient(45deg, #ff0057, #e91e63); top: 10%; left: 10%; animation: animateBg 8s infinite alternate; }
        body::after { background: linear-gradient(45deg, #00d2ff, #3a7bd5); bottom: 10%; right: 10%; animation: animateBg 8s infinite alternate-reverse; }

        @keyframes animateBg { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 50px); } }

        .login-box {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 450px;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            backdrop-filter: blur(30px);
            box-shadow: 0 25px 45px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; gap: 15px; text-align: center;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: #fff;
            background: linear-gradient(to right, #00d2ff, #ff0057, #00d2ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .lang-selector { position: absolute; top: 20px; left: 20px; z-index: 100; }
        select { padding: 8px 12px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; cursor: pointer; outline: none; }

        .input-group { position: relative; width: 100%; margin-bottom: 15px; }
        .input-group input, .input-group select {
            width: 100%; padding: 14px 18px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; outline: none; color: #fff; font-size: 0.95rem;
        }
        
        [dir="rtl"] .input-group input { text-align: right; }
        [dir="ltr"] .input-group input { text-align: left; }

        .input-group label {
            position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4); transition: 0.4s; pointer-events: none;
        }

        .input-group input:focus ~ label, .input-group input:valid ~ label {
            top: -10px; right: 8px; font-size: 0.75rem; color: #00d2ff; background: #050505; padding: 0 5px;
        }

        .login-btn {
            width: 100%; padding: 14px; background: #fff; border: none; border-radius: 12px;
            cursor: pointer; font-weight: 800; text-transform: uppercase; transition: 0.4s;
        }
        .login-btn:hover { background: #00d2ff; box-shadow: 0 0 30px rgba(0, 210, 255, 0.5); }

        .code-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
            width: 100%;
        }
        .code-row .input-group { margin-bottom: 0; flex: 1; }

        .buy-btn {
            height: 50px;
            padding: 0 15px;
            background: rgba(37, 211, 102, 0.1);
            border: 1px solid rgba(37, 211, 102, 0.3);
            border-radius: 12px;
            color: #25d366;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }
        .buy-btn:hover {
            background: #25d366;
            color: #fff;
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.4);
        }

        .switch-form { color: #fff; font-size: 0.85rem; cursor: pointer; text-decoration: underline; margin-top: 10px; }
        .hidden { display: none; }
        .error { color: #ff0057; font-size: 0.85rem; min-height: 20px; }
    </style>
</head>
<body>

    <div class="lang-selector">
        <select id="langSelect" onchange="changeLanguage()">
            <option value="badini">بادینى</option>
            <option value="sorani">سۆرانی</option>
            <option value="ar">العربية</option>
            <option value="fa">فارسی</option>
            <option value="en">English</option>
        </select>
    </div>

    <div class="login-box" id="signInBox">
        <h2 id="si-title">SIGN IN</h2>
        <form onsubmit="handleSignIn(event)">
            <div class="input-group">
                <input type="text" id="si-user" required>
                <label id="si-label-user">Username</label>
            </div>
            <div class="input-group">
                <input type="password" id="si-pass" required>
                <label id="si-label-pass">Password</label>
            </div>
            <p class="error" id="si-error"></p>
            <button type="submit" class="login-btn" id="si-btn">Sign In</button>
        </form>
        <p class="switch-form" onclick="toggleForm()" id="si-switch">Create Account</p>
    </div>

    <div class="login-box hidden" id="signUpBox">
        <h2 id="su-title">SIGN UP</h2>
        <form onsubmit="handleSignUp(event)">
            <div class="input-group">
                <input type="text" id="su-user" required>
                <label id="su-label-user">New Username</label>
            </div>
            <div class="input-group">
                <input type="password" id="su-pass" required>
                <label id="su-label-pass">New Password</label>
            </div>
            <div class="input-group">
                <select id="su-role">
                    <option value="cashier" id="opt-cashier">Cashier</option>
                    <option value="admin" id="opt-admin">Administrator</option>
                </select>
            </div>
            
            <div class="code-row">
                <div class="input-group">
                    <input type="text" id="su-code" maxlength="6" required>
                    <label id="su-label-code">6-Digit Code</label>
                </div>
                <button type="button" class="buy-btn" id="buy-code-btn" onclick="openWhatsApp()">
                    کڕینا کۆدی
                </button>
            </div>

            <p class="error" id="su-error"></p>
            <button type="submit" class="login-btn" id="su-btn">Register</button>
        </form>
        <p class="switch-form" onclick="toggleForm()" id="su-switch">Back to Login</p>
    </div>

    <script>
        const cashierCodes = ["993596", "276914", "908792", "251911", "126012", "596871", "732343", "701500", "487213"];
        const adminCodes = ["857626", "705446", "736741", "754549", "739260", "700832", "731720", "757148", "715093", "746958"];

        const translations = {
            badini: { 
                siTitle: "چوونەژوورێ", suTitle: "تۆمارکرن", user: "ناڤێ بکارئینەری", pass: "کۆدا نهێنی", 
                siBtn: "داخلبوون", suBtn: "تۆمارکرن", switchSu: "حیسابەکا نوی چێکە", switchSi: "زڤڕین بۆ داخلبوونێ", 
                roleC: "کاشێر", roleA: "ئەدمین", code: "کۆدی (٦ ژمارە)", error: "کۆد یان زانیاری شێلۆنە", buyCode: "کڕینا کۆدی",
                waMsg: "سڵاو، ئەز دخوازم کۆدەکێ چالاککرنێ بکڕم"
            },
            sorani: { 
                siTitle: "چوونەژوورەوە", suTitle: "خۆتۆمارکردن", user: "ناوی بەکارهێنەر", pass: "وشەی نهێنی", 
                siBtn: "چوونەژوورەوە", suBtn: "تۆمارکردن", switchSu: "هەژمارێکی نوێ دروست بکە", switchSi: "گەڕانەوە بۆ چوونەژوورەوە", 
                roleC: "کاشێر", roleA: "بەڕێوەبەر", code: "کۆد (٦ ژمارە)", error: "کۆدەکە یان زانیارییەکان هەڵەن", buyCode: "کڕینی کۆد",
                waMsg: "سڵاو، دەمەوێت کۆدێکی چالاککردن بکڕم"
            },
            ar: { 
                siTitle: "تسجيل الدخول", suTitle: "إنشاء حساب", user: "اسم المستخدم", pass: "كلمة المرور", 
                siBtn: "دخول", suBtn: "تسجيل", switchSu: "إنشاء حساب جديد", switchSi: "العودة للدخول", 
                roleC: "كاشير", roleA: "مدير", code: "الرمز (6 أرقام)", error: "الرمز أو البيانات خاطئة", buyCode: "شراء الرمز",
                waMsg: "مرحباً، أريد شراء كود التفعيل"
            },
            fa: { 
                siTitle: "ورود به سیستم", suTitle: "ثبت نام", user: "نام کاربری", pass: "رمز عبور", 
                siBtn: "ورود", suBtn: "ثبت نام", switchSu: "ایجاد حساب جدید", switchSi: "بازگشت به ورود", 
                roleC: "صندوقدار", roleA: "مدیر", code: "کد (۶ رقم)", error: "کد یا اطلاعات اشتباه است", buyCode: "خرید کد",
                waMsg: "سلام، می‌خواهم کد فعال‌سازی بخرم"
            },
            en: { 
                siTitle: "SIGN IN", suTitle: "SIGN UP", user: "Username", pass: "Password", 
                siBtn: "Login", suBtn: "Register", switchSu: "Create new account", switchSi: "Back to Login", 
                roleC: "Cashier", roleA: "Admin", code: "Code (6 digits)", error: "Invalid Code or Data", buyCode: "Buy Code",
                waMsg: "Hello, I want to buy an activation code"
            }
        };

        function openWhatsApp() {
            const lang = document.getElementById('langSelect').value;
            const message = encodeURIComponent(translations[lang].waMsg);
            const phoneNumber = "9647503644666";
            window.open(`https://wa.me/${phoneNumber}?text=${message}`, "_blank");
        }

        function changeLanguage() {
            const lang = document.getElementById('langSelect').value;
            const t = translations[lang];
            
            document.documentElement.dir = (lang === 'en') ? 'ltr' : 'rtl';
            
            document.getElementById('si-title').innerText = t.siTitle;
            document.getElementById('su-title').innerText = t.suTitle;
            document.getElementById('si-label-user').innerText = t.user;
            document.getElementById('su-label-user').innerText = t.user;
            document.getElementById('si-label-pass').innerText = t.pass;
            document.getElementById('su-label-pass').innerText = t.pass;
            document.getElementById('si-btn').innerText = t.siBtn;
            document.getElementById('su-btn').innerText = t.suBtn;
            document.getElementById('si-switch').innerText = t.switchSu;
            document.getElementById('su-switch').innerText = t.switchSi;
            document.getElementById('su-label-code').innerText = t.code;
            document.getElementById('opt-cashier').innerText = t.roleC;
            document.getElementById('opt-admin').innerText = t.roleA;
            document.getElementById('buy-code-btn').innerText = t.buyCode;
        }

        function toggleForm() {
            document.getElementById('signInBox').classList.toggle('hidden');
            document.getElementById('signUpBox').classList.toggle('hidden');
            document.getElementById('si-error').innerText = "";
            document.getElementById('su-error').innerText = "";
        }

        function handleSignUp(e) {
            e.preventDefault();
            const user = document.getElementById('su-user').value;
            const pass = document.getElementById('su-pass').value;
            const role = document.getElementById('su-role').value;
            const code = document.getElementById('su-code').value;
            const errorEl = document.getElementById('su-error');
            const lang = document.getElementById('langSelect').value;

            let isValid = false;
            if (role === 'cashier' && cashierCodes.includes(code)) isValid = true;
            if (role === 'admin' && adminCodes.includes(code)) isValid = true;

            if (isValid) {
                let users = JSON.parse(localStorage.getItem('system_users') || '[]');
                if(users.find(u => u.user === user)) {
                    errorEl.innerText = (lang === 'en') ? "User already exists!" : "ئەڤ ناڤە یێ هەی!";
                    return;
                }
                users.push({ user, pass, role });
                localStorage.setItem('system_users', JSON.stringify(users));
                alert((lang === 'en') ? "Success! Account created." : "تەحیر! حیساب هاتە چێکرن.");
                toggleForm();
            } else {
                errorEl.innerText = translations[lang].error;
            }
        }

        function handleSignIn(e) {
            e.preventDefault();
            const user = document.getElementById('si-user').value;
            const pass = document.getElementById('si-pass').value;
            const lang = document.getElementById('langSelect').value;
            const users = JSON.parse(localStorage.getItem('system_users') || '[]');
            const found = users.find(u => u.user === user && u.pass === pass);
            if (found) {
                alert(`${translations[lang].siTitle}: ${found.user}`);
            } else {
                document.getElementById('si-error').innerText = translations[lang].error;
            }
        }

        changeLanguage();
    </script>
</body>
</html>
