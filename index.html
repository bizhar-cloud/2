<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#9e0b0f">
    
    <meta name="apple-mobile-web-app-title" content="Bizhar">
    <meta name="application-name" content="Bizhar">
    
    <link rel="apple-touch-icon" href="https://i.postimg.cc/SsqXCWmB/3D691CC7-744A-4545-B415-184352388122.png">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/SsqXCWmB/3D691CC7-744A-4545-B415-184352388122.png">
    
    <title>یارییا بینگۆ - دیزاینا کلاسیک (1 - 99)</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* دیزاینا کلاسیک وەکی وێنەی */
        :root {
            --bg-dark-red: #9e0b0f;
            --bg-left-yellow: #fce883;
            --bg-right-gold: #cba85a;
            --col-b: #00bfff;
            --col-i: #dc143c;
            --col-n: #a9a9a9;
            --col-g: #32cd32;
            --col-o: #ffd700;
        }

        body {
            font-family: 'Noto Sans Arabic', Tahoma, Arial, sans-serif;
            background-color: #000;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            touch-action: manipulation; 
            -webkit-user-select: none; 
            user-select: none;
        }
        
        input {
            -webkit-user-select: auto;
            user-select: auto;
        }
        
        .container {
            width: 100%;
            max-width: 900px;
            background-color: var(--bg-dark-red);
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            margin: auto;
        }

        .layout-wrapper {
            display: flex;
            flex-direction: row;
            gap: 10px;
        }
        
        .left-panel {
            flex: 1.2;
            background-color: var(--bg-left-yellow);
            border-radius: 8px;
            border: 2px solid #5a0000;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .right-panel {
            flex: 1.5;
            background-color: var(--bg-right-gold);
            border-radius: 8px;
            border: 2px solid #5a0000;
            padding: 8px;
            display: flex;
            flex-direction: column;
        }

        .monitor-box {
            background: #ffffff;
            border: 12px solid #f2c94c;
            border-radius: 50%;
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px auto 20px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4), inset 0 -6px 10px rgba(0,0,0,0.1);
        }
        
        #drawnNumberDisplay {
            font-size: 5em;
            font-weight: bold;
            color: #666;
            font-family: Arial, sans-serif;
        }

        .pop-animation { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }

        .match-display {
            background: var(--bg-dark-red);
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 2px solid #5a0000;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .match-text {
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }
        .match-text.hit { color: #00ffcc; transform: scale(1.05); }
        .match-text .highlight-num { color: #ffd700; font-size: 1.3em; font-family: Arial, sans-serif; margin: 0 5px; }

        .speed-control {
            margin-bottom: 15px;
            font-weight: bold;
            color: #8b0000;
        }
        .speed-control input {
            width: 50px;
            padding: 5px;
            text-align: center;
            border: 2px solid #8b0000;
            border-radius: 5px;
            font-weight: bold;
        }

        .buttons-row { display: flex; gap: 10px; width: 100%; margin-bottom: 20px; }
        .btn-modern { 
            flex: 1; 
            padding: 15px 10px; 
            font-size: 16px; 
            font-weight: bold; 
            font-family: inherit; 
            border: 2px solid #555; 
            border-radius: 8px; 
            cursor: pointer; 
            color: white; 
            background: linear-gradient(to bottom, #d4d4d4, #7a7a7a);
            text-shadow: 1px 1px 2px #000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
        }
        .btn-modern:active { transform: translateY(2px); box-shadow: 0 2px 3px rgba(0,0,0,0.4); }
        .btn-auto.stop-mode { background: linear-gradient(to bottom, #ff6b6b, #c00); }

        .players-section {
            width: 100%;
            background: #fff;
            border: 4px solid var(--bg-dark-red);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .players-header {
            background: var(--bg-dark-red);
            color: white;
            padding: 6px;
            font-weight: bold;
            font-size: 14px;
        }
        .players-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .custom-input { padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-family: inherit; }
        .btn-add { background: linear-gradient(to bottom, #b5b5b5, #7a7a7a); color: white; padding: 10px; font-size: 16px; font-weight: bold; border: 2px solid #555; border-radius: 6px; cursor: pointer; text-shadow: 1px 1px 2px #000; }
        .btn-clear-all { background: linear-gradient(to bottom, #ff9999, #cc0000); color: white; padding: 10px; width: 100%; font-size: 14px; font-weight: bold; border: 2px solid #555; border-radius: 6px; cursor: pointer; text-shadow: 1px 1px 2px #000; margin-top: 5px; }

        .players-list { text-align: right; max-height: 150px; overflow-y: auto; padding-right: 5px; }
        .player-card { background: #f0f0f0; padding: 8px; margin-bottom: 5px; border-radius: 4px; border: 1px solid #ccc; display: flex; flex-direction: column; gap: 5px; }
        .player-card.safe { background: #90ee90; }
        .player-name { font-weight: bold; font-size: 15px; display: flex; justify-content: space-between; color: #000; }
        .safe-badge { color: #006400; font-size: 12px; }
        .btn-edit { background: #ffd700; color: #000; border: 1px solid #b8860b; padding: 3px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        
        /* ----- ستایلا بەشێ ڕاستێ (بۆرد) ----- */
        .bingo-board {
            display: grid;
            grid-template-columns: repeat(10, 1fr); 
            gap: 4px;
            flex: 1;
            margin-top: 5px; 
            width: 100%;
        }
        
        .board-cell {
            background: #fff;
            color: #000;
            font-weight: bold;
            font-size: 13px;
            font-family: Arial, sans-serif;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1; 
            border: 3px solid #ccc;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.2), 1px 2px 3px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }

        .board-cell:nth-child(10n + 1), .board-cell:nth-child(10n + 2) { border-color: var(--col-b); }
        .board-cell:nth-child(10n + 3), .board-cell:nth-child(10n + 4) { border-color: var(--col-i); }
        .board-cell:nth-child(10n + 5), .board-cell:nth-child(10n + 6) { border-color: var(--col-n); }
        .board-cell:nth-child(10n + 7), .board-cell:nth-child(10n + 8) { border-color: var(--col-g); }
        .board-cell:nth-child(10n + 9), .board-cell:nth-child(10n + 10) { border-color: var(--col-o); }

        .board-cell.drawn {
            background: radial-gradient(circle at 30% 30%, #da70d6, #800080);
            color: white;
            border-color: #4b0082;
            transform: scale(1.15);
        }

        .number-circle { display: inline-block; width: 24px; height: 24px; line-height: 24px; text-align: center; background: #fff; border-radius: 50%; margin: 2px; font-weight: bold; color: #333; font-size: 12px; border: 2px solid #ccc; font-family: Arial; }
        .number-circle.matched { background: radial-gradient(circle at 30% 30%, #da70d6, #800080); color: white; border-color: #4b0082; }

        .celebration-toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: rgba(255, 215, 0, 0.95); backdrop-filter: blur(10px); color: #8b0000;
            padding: 30px 50px; border-radius: 20px; font-size: 2em; font-weight: 900; text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5); border: 4px solid #8b0000; z-index: 2000; opacity: 0; transition: all 0.4s; pointer-events: none;
        }
        .celebration-toast.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        .celebration-toast span.winner-name { color: #000; font-size: 1.2em; display: block; margin: 10px 0; }

        .winner-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .loser-text { font-size: 3em; font-weight: 900; color: #ffd700; text-align: center; margin-bottom: 20px; text-shadow: 2px 2px 4px #000; }
        .loser-text span { color: #fff; font-size: 1.2em; }
        .btn-restart { background: linear-gradient(to bottom, #d4d4d4, #7a7a7a); color: white; padding: 15px 40px; font-size: 20px; font-weight: 900; border: 2px solid #555; border-radius: 10px; cursor: pointer; text-shadow: 1px 1px 2px #000; }

        @media (min-width: 900px) {
            .container { max-width: 1200px; padding: 20px; }
            .layout-wrapper { flex-direction: row; align-items: stretch; gap: 20px; }
            .left-panel { flex: 1; justify-content: flex-start; }
            .right-panel { flex: 1.5; justify-content: center; align-items: center; }
            .bingo-board { width: 100%; max-width: 75vh; margin: auto; gap: 4px; }
            .board-cell { font-size: 2.5vh; }
            .players-list { max-height: 25vh; }
        }

        /* ===== چارەسەرییا لاندسکەیپ (فول سکرین و پاراستنا بازنەیان) ===== */
        @media (orientation: landscape) and (max-height: 600px) {
            body { 
                padding: 0; 
                margin: 0; 
                height: 100vh; 
                width: 100vw; 
                overflow: hidden; 
                background-color: #000;
            }
            
            .container { 
                padding: 6px; 
                max-width: 100%; 
                height: 100vh; 
                border-radius: 0; 
                display: flex; 
                flex-direction: column; 
                box-sizing: border-box;
                margin: 0;
            }
            
            .layout-wrapper { 
                flex-direction: row; 
                align-items: stretch; 
                justify-content: center; 
                gap: 4px; 
                height: 100%; 
                width: 100%;
                overflow: hidden;
            }
            
            .left-panel { 
                flex: 1; 
                max-width: 40%; 
                height: 96vh; 
                overflow-y: auto; 
                padding: 12px; 
                box-sizing: border-box;
                margin: auto 0;
            }
            
            .right-panel { 
                flex: 0 0 auto; 
                height: 96vh; 
                padding: 2px; 
                display: flex; 
                justify-content: center; 
                align-items: center; 
                background: none;
                border: none;
                box-sizing: border-box;
                overflow: hidden; 
            }
            
            .players-section { 
                flex: 1; 
                max-width: 40%; 
                display: flex; 
                flex-direction: column; 
                height: 96vh;
                margin: auto 0;
                padding: 12px;
                box-sizing: border-box;
            }

            .bingo-board { 
                display: grid;
                grid-template-columns: repeat(10, 1fr);
                grid-template-rows: repeat(10, 1fr);
                height: min(94vh, 55vw); 
                width: min(94vh, 55vw); 
                gap: 3px; 
                margin: auto;
                padding: 5px;
                box-sizing: border-box;
                flex-shrink: 0; 
                background: var(--bg-right-gold);
                border: 2px solid #5a0000;
                border-radius: 8px;
            }
            
            .board-cell { 
                font-size: min(3vh, 2vw); 
                border-width: 1px; 
                width: 100%;
                height: 100%;
                aspect-ratio: 1 / 1; 
                margin: 0;
            }
            
            .monitor-box { 
                width: 20vh; 
                height: 20vh; 
                border-width: 6px; 
                margin: 0 auto 10px; 
                padding: 0;
                flex-shrink: 0; 
                aspect-ratio: 1 / 1;
            }
            #drawnNumberDisplay { font-size: 9vh; line-height: 1; } 
            
            .match-display { min-height: 40px; padding: 10px; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
            .match-text { font-size: 3vh; }
            .match-text .highlight-num { font-size: 3.5vh; }
            
            .speed-control { margin-bottom: 10px; font-size: 2.8vh; padding: 10px;}
            .speed-control input { padding: 4px; font-size: 2.8vh; width: 55px;}
            
            .buttons-row { margin-bottom: 10px; flex-direction: column; gap: 8px;}
            .btn-modern { padding: 12px; font-size: 2.8vh; min-height: 45px; } 
            
            .players-header { font-size: 2.5vh; padding: 10px; }
            .players-body { padding: 8px; flex: 1; display: flex; flex-direction: column; gap: 8px; overflow: hidden; }
            .input-group { margin-bottom: 0; gap: 8px;}
            .custom-input { padding: 10px; font-size: 2.5vh; }
            .btn-add { padding: 10px; font-size: 2.5vh; }
            .btn-clear-all { padding: 10px; font-size: 2.2vh; margin-top: 0; margin-bottom: 5px;}
            
            .players-list { flex: 1; max-height: none; overflow-y: auto; padding-right: 5px; }
            .player-card { padding: 10px; margin-bottom: 6px; }
            .player-name { font-size: 2.5vh; }
            .number-circle { width: 3.5vh; height: 3.5vh; line-height: 3.5vh; font-size: 2vh; }
            
            .celebration-toast { font-size: 2em; padding: 20px; width: 85%; }
        }

        @media (max-width: 700px) and (orientation: portrait) {
            .layout-wrapper { flex-direction: column; }
            .bingo-board { gap: 3px; max-width: 100%; padding: 10px;}
            .board-cell { font-size: 13px; border-width: 2px;}
            #drawnNumberDisplay { font-size: 4em; }
        }
    </style>
</head>
<body>

    <div class="celebration-toast" id="celebrationToast"></div>

    <div class="container">
        
        <div class="layout-wrapper">
            
            <div class="left-panel">
                
                <div class="monitor-box">
                    <div id="drawnNumberDisplay">--</div>
                </div>

                <div class="match-display" id="matchDisplay">
                    <div class="match-text" id="matchText">چاڤەڕێی ڕاکێشانێ یە...</div>
                </div>

                <div class="speed-control">
                    <label for="speedInput">لەزاتیا یاریێ (سانیە):</label>
                    <input type="number" id="speedInput" min="1" max="30" value="3">
                </div>

                <div class="buttons-row">
                    <button class="btn-modern btn-draw" onclick="drawNumber()">ڕاکێشان (١ جار)</button>
                    <button class="btn-modern btn-auto" id="autoBtn" onclick="toggleAutoDraw()">ستارت (Start)</button>
                </div>

            </div>

            <div class="right-panel">
                <div class="bingo-board" id="bingoBoard"></div>
            </div>

            <div class="players-section">
                <div class="players-header">تۆمارکرنا یاریزانان</div>
                <div class="players-body">
                    <div class="input-group">
                        <input type="text" id="playerName" class="custom-input" placeholder="ناڤێ یاریزانی (نموونە: بـــژار)">
                        <input type="text" id="playerNumbers" class="custom-input" placeholder="ژمارەیێن وی (نموونە: 13, 5, 94)">
                        <button class="btn-add" onclick="addPlayer()">Change (زێدەبکە)</button>
                    </div>
                    <button class="btn-clear-all" onclick="clearAllPlayers()">🗑 ڕەشکرنا هەمی یاریزانان</button>
                    <div class="players-list" id="playersList"></div>
                </div>
            </div>

        </div>
    </div>

    <div class="winner-modal" id="winnerModal">
        <div class="loser-text" id="loserText"></div>
        <button class="btn-restart" onclick="resetGame()">یارییەکا نوی دەستپێبکە</button>
    </div>

    <script>
        let players = [];
        let drawnNumbers = [];
        let autoInterval = null;
        let isAutoPlaying = false;
        let audioCtx;
        let celebrationTimeout; 

        window.onload = function() {
            initBoard();
            loadGameState(); 
        };

        function saveGameState() {
            localStorage.setItem('bingo1to99Players', JSON.stringify(players));
            localStorage.setItem('bingo1to99Drawn', JSON.stringify(drawnNumbers));
        }

        function loadGameState() {
            const savedPlayers = localStorage.getItem('bingo1to99Players');
            const savedDrawn = localStorage.getItem('bingo1to99Drawn');

            if (savedPlayers) { players = JSON.parse(savedPlayers); }
            if (savedDrawn) { drawnNumbers = JSON.parse(savedDrawn); }

            renderPlayers();

            if (drawnNumbers.length > 0) {
                drawnNumbers.forEach(n => {
                    const cell = document.getElementById('cell-' + n);
                    if (cell) cell.classList.add('drawn');
                });
                const last = drawnNumbers[drawnNumbers.length - 1];
                document.getElementById('drawnNumberDisplay').innerText = last < 10 ? '0' + last : last;
            }
        }

        function playSound(type) {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'draw') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'safe') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'lose') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 1.5);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
                osc.start(); osc.stop(audioCtx.currentTime + 1.5);
            }
        }

        function initBoard() {
            const board = document.getElementById('bingoBoard');
            board.innerHTML = '';
            for(let i = 1; i <= 99; i++) {
                let cell = document.createElement('div');
                cell.className = 'board-cell';
                cell.id = 'cell-' + i;
                cell.innerText = i;
                board.appendChild(cell);
            }
        }

        function addPlayer() {
            const nameInput = document.getElementById('playerName');
            const numsInput = document.getElementById('playerNumbers');
            const name = nameInput.value.trim();
            const numsStr = numsInput.value.trim();

            if(!name || !numsStr) { alert('هیڤییە ناڤ و ژماران ب دروستی داخل بکە!'); return; }
            
            const numbers = numsStr.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n) && n >= 1 && n <= 99);
            
            if(numbers.length === 0) { alert('هیڤییە ژمارەیێن دروست د ناڤبەرا 1 تا 99 بنڤیسە!'); return; }

            const uniqueNumbers = [...new Set(numbers)];
            if (uniqueNumbers.length !== numbers.length) {
                alert('تە ژمارەیەک دوو جاران یا نڤیسی. هیڤییە ژمارەیێن دووبارە ڕابکە!');
                return;
            }

            let allUsedNumbers = [];
            players.forEach(p => { allUsedNumbers = allUsedNumbers.concat(p.numbers); });
            let duplicateFound = numbers.find(n => allUsedNumbers.includes(n));
            
            if (duplicateFound !== undefined) {
                alert(`لێبۆڕینێ دخوازم، ژمارە (${duplicateFound}) پێشتر ژ لایێ کەسەکێ دی ڤە هاتییە هەلبژارتن!\nهیڤییە ژمارەیەکا دی بنڤیسە.`);
                return;
            }

            players.push({ id: Date.now(), name: name, numbers: numbers, isSafe: false });
            nameInput.value = ''; numsInput.value = '';
            saveGameState(); 
            renderPlayers();
        }

        function editPlayer(id) {
            const playerIndex = players.findIndex(p => p.id === id);
            if(playerIndex > -1) {
                const p = players[playerIndex];
                document.getElementById('playerName').value = p.name;
                document.getElementById('playerNumbers').value = p.numbers.join(', ');
                players.splice(playerIndex, 1);
                saveGameState(); 
                renderPlayers();
            }
        }

        function clearAllPlayers() {
            if (players.length === 0) return;
            if (confirm("ئایا تو یێ پشتڕاستی دڤێت هەمی یاریزانان ڕەش بکەی؟")) {
                players = [];
                drawnNumbers = [];
                saveGameState();
                document.getElementById('drawnNumberDisplay').innerText = '--';
                document.getElementById('matchText').innerHTML = 'چاڤەڕێی ڕاکێشانێ یە...';
                document.getElementById('matchText').classList.remove('hit');
                initBoard(); 
                renderPlayers();
            }
        }

        function renderPlayers() {
            const list = document.getElementById('playersList');
            list.innerHTML = '';
            players.forEach(p => {
                const card = document.createElement('div');
                card.className = `player-card ${p.isSafe ? 'safe' : ''}`;
                let numsHtml = p.numbers.map(n => {
                    let isMatched = drawnNumbers.includes(n) ? 'matched' : '';
                    return `<span class="number-circle ${isMatched}">${n}</span>`;
                }).join('');
                card.innerHTML = `
                    <div class="player-info">
                        <div class="player-name">
                            <span>${p.name} ${p.isSafe ? '<span class="safe-badge">(قورتال بوو)</span>' : ''}</span>
                            ${!p.isSafe && drawnNumbers.length === 0 ? `<button class="btn-edit" onclick="editPlayer(${p.id})">دەستکاری</button>` : ''}
                        </div>
                        <div style="margin-top:10px;">${numsHtml}</div>
                    </div>`;
                list.appendChild(card);
            });
        }

        function toggleAutoDraw() {
            if (players.length < 2) { alert('ب لایەنی ڤە پێدڤییە ٢ یاریزان هەبن بۆ ڤێ یاریێ!'); return; }
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const btn = document.getElementById('autoBtn');
            const speedInput = document.getElementById('speedInput');
            
            if (isAutoPlaying) {
                stopAutoMode();
            } else {
                let speedSeconds = parseInt(speedInput.value);
                if (isNaN(speedSeconds) || speedSeconds < 1) speedSeconds = 1;
                if (speedSeconds > 30) speedSeconds = 30;
                speedInput.value = speedSeconds; 
                
                isAutoPlaying = true;
                btn.innerText = "پاوس (Pause)";
                btn.classList.add('stop-mode');
                speedInput.disabled = true; 
                
                drawNumber(); 
                autoInterval = setInterval(drawNumber, speedSeconds * 1000); 
            }
        }

        function stopAutoMode() {
            isAutoPlaying = false;
            clearInterval(autoInterval);
            const btn = document.getElementById('autoBtn');
            const speedInput = document.getElementById('speedInput');
            btn.innerText = "ستارت (Start)";
            btn.classList.remove('stop-mode');
            speedInput.disabled = false; 
        }

        function showCelebration(namesArray) {
            const toast = document.getElementById('celebrationToast');
            toast.innerHTML = `🎉 پیرۆزە 🎉<br><span class="winner-name">${namesArray.join(' و ')}</span>تو بسەرکەفتی!`;
            toast.classList.add('show');
            
            confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 }, zIndex: 3000 });
            
            clearTimeout(celebrationTimeout);
            celebrationTimeout = setTimeout(() => { toast.classList.remove('show'); }, 3500); 
        }

        function drawNumber() {
            if (drawnNumbers.length >= 99) { stopAutoMode(); alert('هەمی ژمارە دەرکەفتن!'); return; }

            let drawn;
            do { 
                drawn = Math.floor(Math.random() * 99) + 1; 
            } while (drawnNumbers.includes(drawn));
            
            drawnNumbers.push(drawn);
            playSound('draw');
            saveGameState(); 

            const display = document.getElementById('drawnNumberDisplay');
            display.innerText = drawn < 10 ? '0' + drawn : drawn; 
            display.classList.remove('pop-animation');
            void display.offsetWidth; 
            display.classList.add('pop-animation');

            document.getElementById('cell-' + drawn).classList.add('drawn');
            
            let hitPlayers = [];
            players.forEach(p => { if (p.numbers.includes(drawn)) { hitPlayers.push(p.name); } });

            const matchText = document.getElementById('matchText');
            if (hitPlayers.length > 0) {
                matchText.innerHTML = `ژمارە <span class="highlight-num">${drawn}</span> بۆ: ${hitPlayers.join(' و ')}`;
                matchText.classList.add('hit');
                setTimeout(() => { matchText.classList.remove('hit'); }, 1000);
            } else {
                matchText.innerHTML = `ژمارە <span class="highlight-num">${drawn}</span> دەرکەفت!<br><span style="font-size: 0.75em; color: #ccc; font-weight: normal;">(یا چ کەسان نینە)</span>`;
                matchText.classList.remove('hit');
            }
            
            checkWinner();
            renderPlayers(); 
        }

        function checkWinner() {
            if(players.length < 2) return;
            
            let newlySafePlayers = [];

            players.forEach(p => {
                if (!p.isSafe) {
                    let allMatched = p.numbers.every(n => drawnNumbers.includes(n));
                    if (allMatched) { p.isSafe = true; newlySafePlayers.push(p.name); }
                }
            });

            if (newlySafePlayers.length > 0) {
                playSound('safe'); 
                showCelebration(newlySafePlayers); 
                saveGameState(); 
            }

            let remainingPlayers = players.filter(p => !p.isSafe);

            if (remainingPlayers.length === 1 && players.length > 1) {
                stopAutoMode(); 
                playSound('lose'); 
                const loser = remainingPlayers[0];
                document.getElementById('loserText').innerHTML = `خوسارەت!<br><span>${loser.name}</span>`;
                document.getElementById('winnerModal').style.display = 'flex';
            } else if (remainingPlayers.length === 0 && players.length > 1) {
                stopAutoMode();
                document.getElementById('loserText').innerHTML = `یاری ب دوماهیک هات!<br><span style="color:var(--neon-blue); font-size: 0.5em; -webkit-text-stroke: 0; text-shadow:none;">چ خوسارەت نینن</span>`;
                document.getElementById('winnerModal').style.display = 'flex';
            }
        }

        function resetGame() {
            stopAutoMode();
            drawnNumbers = []; 
            players.forEach(p => p.isSafe = false); 
            saveGameState(); 

            clearTimeout(celebrationTimeout);
            document.getElementById('celebrationToast').classList.remove('show');
            document.getElementById('drawnNumberDisplay').innerText = '--';
            document.getElementById('matchText').innerHTML = 'چاڤەڕێی ڕاکێشانێ یە...';
            document.getElementById('matchText').classList.remove('hit');
            document.getElementById('winnerModal').style.display = 'none';
            initBoard(); 
            renderPlayers();
        }
    </script>
</body>
</html>
